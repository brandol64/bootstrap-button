<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title class="">Bootstrap Button Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <h1 class="text-center">Bootstrap Button Showcase</h1>

    <div class="containter mt-5">
        <h1 class="mb-4">Button</h1>
        <div>
            <button class="btn btn-primary" type="#">Click Me</button>
        </div>
        <br>
        <h1 class="mb-4">Button Colors</h1>
        <div>
            <a class="btn btn-primary" href="#">btn-Primary</a>
            <a class="btn btn-secondary" href="#">btn-Secondary</a>
            <a class="btn btn-success" href="#">btn-Success</a>
            <a class="btn btn-danger" href="#">btn-Danger</a>
            <a class="btn btn-warning" href="#">btn-Warning</a>
            <a class="btn btn-info" href="#">btn-Info</a>
            <a class="btn btn-light" href="#">btn-Light</a>
            <a class="btn btn-dark" href="#">btn-Dark</a>
        </div>
        <h1 class="mb-4 mt-5">Button Styles</h1>
        <div class="d-grid gap-2 d-md-block">
            <button class="btn btn-primary" type="button">solid-Primary</button>
            <button class="btn btn-danger" type="button">solid-Danger</button>
            <button type="button" class="btn btn-success">solid-Success</button>
            <button type="button" class="btn btn-outline-primary">outline-Primary</button>
            <button type="button" class="btn btn-outline-success">outline-Success</button>
            <button type="button" class="btn btn-outline-danger">outline-Danger</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
